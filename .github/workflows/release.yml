name: Release Build

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-chef
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-chef

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libfuse2 libtorrent-rasterbar-dev libboost-dev libclang-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cargo Chef Prepare
        run: cargo chef prepare --recipe-path recipe.json

      - name: Cargo Chef Cache
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-check-cargo-chef-${{ hashFiles('recipe.json') }}
          restore-keys: |
            ${{ runner.os }}-check-cargo-chef-

      - name: Cargo Chef Cook
        run: |
          cargo chef cook --recipe-path recipe.json --features libtorrent --no-default-features

      - name: Restore Source Code
        run: git restore server enginefs bindings stremio-runtime-stub updater-helper

      - name: Run Clippy
        run: cargo clippy --workspace --features libtorrent --no-default-features

      - name: Run Tests
        run: cargo test --workspace --features libtorrent --no-default-features

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
            toolchain: stable
            target: x86_64-pc-windows-msvc

      - name: Install cargo-chef and cargo-wix
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-chef,cargo-wix

      - name: Cargo Registry Cache
        uses: actions/cache@v6
        with:
          path: |
            C:\Users\runneradmin\.cargo\registry
            C:\Users\runneradmin\.cargo\git
          key: Windows-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            Windows-cargo-registry-

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL);
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN);

      - name: Cache vcpkg installed packages
        id: vcpkg-cache
        uses: actions/cache@v6
        with:
          path: vcpkg_installed
          key: Windows-vcpkg-static-release-v1-${{ hashFiles('vcpkg.json','triplets/**','vcpkg-overlays/**') }}
          restore-keys: |
            Windows-vcpkg-static-release-v1-
            Windows-vcpkg-static-release-

      - name: Setup vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgJsonGlob: 'vcpkg.json'
          runVcpkgInstall: true
        env:
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
          VCPKG_DEFAULT_TRIPLET: x64-windows-static-release
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets
          # libtorrent 2.0.13 is not yet packaged in vcpkg's registry (still on
          # 2.0.11 as of the pinned vcpkgGitCommitId, and at vcpkg's HEAD too).
          # vcpkg-overlays/libtorrent carries the patched port (verified
          # SHA512 against the real arvidn/libtorrent v2.0.13 release tarball)
          # so CI builds the same version used in local development.
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/vcpkg-overlays

      - name: Cargo Chef Prepare
        run: cargo chef prepare --recipe-path recipe.json

      - name: Cargo Chef Cache
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('recipe.json') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chef-

      - name: Cargo Chef Cook
        run: |
          $env:VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          cargo chef cook --release --recipe-path recipe.json --target x86_64-pc-windows-msvc --features libtorrent --no-default-features
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed
          VCPKGRS_TRIPLET: x64-windows-static-release
          PKG_CONFIG_PATH: ${{ github.workspace }}\vcpkg_installed\x64-windows-static-release\lib\pkgconfig

      - name: Restore Source Code
        run: git restore server enginefs bindings stremio-runtime-stub updater-helper

      - name: Build Release
        run: |
          cargo clean -p server --release
          cargo build --release --target x86_64-pc-windows-msvc --features libtorrent --no-default-features
          cargo build --release --target x86_64-pc-windows-msvc -p stremio-runtime-stub
          cargo build --release --target x86_64-pc-windows-msvc -p updater-helper
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed
          VCPKGRS_TRIPLET: x64-windows-static-release
          PKG_CONFIG_PATH: ${{ github.workspace }}\vcpkg_installed\x64-windows-static-release\lib\pkgconfig

      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: server-windows-amd64
          path: |
            target/x86_64-pc-windows-msvc/release/server.exe
            target/x86_64-pc-windows-msvc/release/stremio-runtime.exe
            target/x86_64-pc-windows-msvc/release/stream-server-updater.exe

      - name: Build MSI Installer
        run: cargo wix --package server --no-build --nocapture --target x86_64-pc-windows-msvc
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed
          VCPKGRS_TRIPLET: x64-windows-static-release
          PKG_CONFIG_PATH: ${{ github.workspace }}\vcpkg_installed\x64-windows-static-release\lib\pkgconfig


      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: server-windows-msi
          path: target/wix/*.msi

      - name: Debug VCPKG Location
        if: always()
        run: |
          Get-ChildItem -Path . -Force
          if (Test-Path vcpkg) { Get-ChildItem -Path vcpkg -Force }
          if (Test-Path vcpkg_installed) { Get-ChildItem -Path vcpkg_installed -Force }

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-chef and cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-chef,cargo-deb

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libfuse2 libtorrent-rasterbar-dev libboost-dev libclang-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cargo Chef Prepare
        run: cargo chef prepare --recipe-path recipe.json

      - name: Cargo Chef Cache
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('recipe.json') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chef-

      - name: Cargo Chef Cook
        run: |
          cargo chef cook --release --recipe-path recipe.json --features libtorrent --no-default-features

      - name: Restore Source Code
        run: git restore server enginefs bindings

      - name: Build Release
        run: cargo build --release --features libtorrent --no-default-features

      - name: Build DEB Package
        run: cargo deb --package server --no-build

      - name: Build AppImage
        run: |
          # Download linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Create AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy binary
          cp target/release/server AppDir/usr/bin/stream-server

          # Create desktop file
          cat > AppDir/usr/share/applications/stream-server.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Stream Server
          Exec=stream-server
          Icon=stream-server
          Categories=Network;
          EOF

          # Create simple icon (placeholder)
          convert -size 256x256 xc:steelblue -gravity center -pointsize 48 -fill white -annotate 0 "SS" AppDir/usr/share/icons/hicolor/256x256/apps/stream-server.png || echo "ImageMagick not available, using placeholder"

          # Build AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage || true

      - name: Upload Binary
        uses: actions/upload-artifact@v7
        with:
          name: server-linux-amd64
          path: target/release/server

      - name: Upload DEB
        uses: actions/upload-artifact@v7
        with:
          name: server-linux-deb
          path: target/debian/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: server-linux-appimage
          path: "*.AppImage"
          if-no-files-found: ignore

  build-arch:
    name: Build Arch Linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm base-devel rust git openssl pkg-config libtorrent-rasterbar boost clang gtk3 libayatana-appindicator

      - name: Cargo Cache
        uses: actions/cache@v6
        with:
          path: |
            target
            /root/.cargo/registry
            /root/.cargo/git
          key: arch-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            arch-cargo-

      - name: Build binary
        run: cargo build --release --features libtorrent --no-default-features

      - name: Create PKGBUILD
        run: |
          mkdir -p pkg
          cat > pkg/PKGBUILD << 'EOF'
          # Maintainer: stream-server maintainers
          pkgname=stream-server
          pkgver=0.1.0
          pkgrel=1
          pkgdesc="High-performance torrent streaming server with HLS transcoding"
          arch=('x86_64')
          url="https://github.com/perpetus/stream-server"
          license=('MIT')
          depends=('openssl' 'libtorrent-rasterbar' 'boost-libs')
          source=("stream-server")
          sha256sums=('SKIP')

          package() {
              install -Dm755 "$srcdir/stream-server" "$pkgdir/usr/bin/stream-server"
          }
          EOF

          cp target/release/server pkg/stream-server

      - name: Build package
        run: |
          cd pkg
          # Create non-root user for makepkg
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -sf --noconfirm"

      - name: Upload Arch Package
        uses: actions/upload-artifact@v7
        with:
          name: server-arch-pkg
          path: pkg/*.pkg.tar.zst

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Windows
          cp artifacts/server-windows-amd64/server.exe release/stream-server-windows-amd64.exe || true
          cp artifacts/server-windows-amd64/stremio-runtime.exe release/stremio-runtime-windows-amd64.exe || true
          cp artifacts/server-windows-amd64/stream-server-updater.exe release/stream-server-updater-windows-amd64.exe || true
          cp artifacts/server-windows-msi/*.msi release/ || true
          # Linux
          cp artifacts/server-linux-amd64/server release/stream-server-linux-amd64 || true
          cp artifacts/server-linux-deb/*.deb release/ || true
          cp artifacts/server-linux-appimage/*.AppImage release/ || true
          # Arch
          cp artifacts/server-arch-pkg/*.pkg.tar.zst release/ || true
          (cd release && sha256sum * > SHA256SUMS.txt)
          ls -la release/

      - name: Generate release description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Project description, per-platform download links, and generated
          # changelog. Written to the workspace root (NOT release/) so it is not
          # uploaded as an asset.
          echo "## Stream Server ${GITHUB_REF_NAME}" > "${GITHUB_WORKSPACE}/RELEASE_BODY.md"
          cat >> "${GITHUB_WORKSPACE}/RELEASE_BODY.md" <<'EOF'

          High-performance torrent streaming server with HLS transcoding and a
          Stremio-compatible streaming API. Features disk-backed downloads,
          hardware-accelerated transcoding, and an embedded HTTP server.

          ### Downloads

          EOF
          repo="${GITHUB_REPOSITORY}"
          tag="${GITHUB_REF_NAME}"

          asset_links() {
            label="$1"
            pattern="$2"

            for asset in release/${pattern}; do
              [ -f "$asset" ] || continue
              name="$(basename "$asset")"
              echo "| ${label} | [Download](https://github.com/${repo}/releases/download/${tag}/${name}) |" >> "${GITHUB_WORKSPACE}/RELEASE_BODY.md"
            done
          }

          {
            echo "| Platform | Download |"
            echo "| --- | --- |"
          } >> "${GITHUB_WORKSPACE}/RELEASE_BODY.md"

          asset_links "Windows (portable)" "stream-server-windows-amd64.exe"
          asset_links "Windows installer" "*.msi"
          asset_links "Windows Stremio runtime" "stremio-runtime-windows-amd64.exe"
          asset_links "Windows updater" "stream-server-updater-windows-amd64.exe"
          asset_links "Debian / Ubuntu" "*.deb"
          asset_links "Linux (portable)" "stream-server-linux-amd64"
          asset_links "Linux (AppImage)" "*.AppImage"
          asset_links "Arch Linux" "*.pkg.tar.zst"
          asset_links "Checksums" "SHA256SUMS.txt"

          cat >> "${GITHUB_WORKSPACE}/RELEASE_BODY.md" <<'EOF'

          Verify your download against `SHA256SUMS.txt`.

          ---
          EOF

          changelog="$(mktemp)"
          if gh api "repos/${repo}/releases/generate-notes" \
            -f tag_name="${tag}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > "${changelog}" && [ -s "${changelog}" ]; then
            cat >> "${GITHUB_WORKSPACE}/RELEASE_BODY.md" <<'EOF'

          ### Changelog

          EOF
            sed -e 's/^## /#### /' "${changelog}" >> "${GITHUB_WORKSPACE}/RELEASE_BODY.md"
          else
            cat >> "${GITHUB_WORKSPACE}/RELEASE_BODY.md" <<'EOF'

          ### Changelog

          GitHub could not generate release notes for this ref.
          EOF
          fi
          rm -f "${changelog}"
          cat "${GITHUB_WORKSPACE}/RELEASE_BODY.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          body_path: ${{ github.workspace }}/RELEASE_BODY.md
          generate_release_notes: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
